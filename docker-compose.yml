services:
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: openemr
      MYSQL_PASSWORD: openemr
      MYSQL_DATABASE: openemr
    volumes:
      - openemr_mysql:/var/lib/mysql

  openemr:
    image: openemr/openemr:7.0.0
    restart: always
    ports:
      - "8300:80"
    environment:
      MYSQL_HOST: mysql
      MYSQL_ROOT_PASS: root
      MYSQL_USER: openemr
      MYSQL_PASS: openemr
      OE_USER: admin
      OE_PASS: admin
    volumes:
      - openemr_data:/var/www/localhost/htdocs/openemr/sites
    depends_on:
      - mysql

volumes:
  openemr_data:
  openemr_mysql: